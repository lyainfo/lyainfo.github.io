<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lya Info | Professional Applications</title>

<!-- SEO Meta Tags (important for search engines) -->
<meta name="description" content="Professional mobile applications.">
<meta name="robots" content="index,follow">

<!-- Favicon -->
<link rel="icon" href="favicon.ico" type="image/x-icon">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #0f0f0f;
    color: #fff;
}

header {
    background: #111;
    padding: 20px;
    text-align: center;
}

header h1 {
    font-size: 32px;
    margin: 0;
}

.hero {
	background: url('img/background-3000.jpg') center/cover no-repeat;
    background-blend-mode: multiply;
    background-color: rgba(0,0,0,0.5);
    text-align: center;
    padding: 200px 20px;
}

.hero h2 {
    font-size: 42px;
    margin-bottom: 15px;
}

.hero button {
    padding: 14px 30px;
    background: #00c6ff;
    border: none;
    font-size: 18px;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    background: #007bbf;
}

.section {
    padding: 20px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(40px);
    transition: 0.8s;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

footer {
    background: #111;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Lya Info</h1>
</header>

<div class="hero">
    <h2>Welcome to Lya Info Mobile Applications</h2>
	
    <p>Stay with us for upcoming and updated mobile applications</p>
	
</div>

<section id="about" class="section">
    <h2>About Us</h2>
    <p>We make professional mobile applications supporting Android OS.</p>
	<p></p>
	<h2><img src="img/cellphone_icon_1920.jpg" alt="cellphone icon" width="64" height="64"></h2>
</section>

<section class="section">
    <h2>Why Choose Us and Our Applications</h2>
    <p>✔ Reliable • ✔ User-friendly • ✔ Customizable • ✔ Ads free</p>
</section>

<footer>
    <p>© 2026 Lya Info</p>
</footer>

<script>

window.addEventListener("scroll", () => {
    document.querySelectorAll('.section').forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) sec.classList.add('show');
    });
});

</script>

</body>
</html>
